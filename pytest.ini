[pytest]
# E2E UI tests are excluded from the default test run because:
# 1. They spin up a real server + browser (slow, side-effects)
# 2. Playwright's sync_playwright leaves the asyncio event loop in a state
#    that breaks pytest-asyncio (used by test_ocr_orchestrator.py).
# Run them explicitly: pytest tests/e2e_ui/ -v
addopts = --ignore=tests/e2e_ui
testpaths = tests